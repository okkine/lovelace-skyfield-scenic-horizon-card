name: Build

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'rollup.config.mjs'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit built file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'build: update dist/skyfield-scenic-horizon-card.js'
          file_pattern: 'dist/skyfield-scenic-horizon-card.js'
